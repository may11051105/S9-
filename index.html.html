<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倚天6. 江湖名門聖品全集</title>
    <style>
        /* 基礎樣式 */
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; padding: 10px; line-height: 1.6; color: #333; }
        .form-card { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* 玩家資訊區 */
        .info-section { background: #e8f4fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d1e9f9; }
        .info-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }

        /* 分頁標籤樣式 */
        .tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { padding: 10px 18px; border: none; background: #ecf0f1; cursor: pointer; border-radius: 20px; white-space: nowrap; font-weight: bold; color: #7f8c8d; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 小組標題 (對應圖片內的區塊) */
        .group-title { background: #f8f9fa; border-left: 5px solid #3498db; padding: 8px 12px; margin: 20px 0 10px; font-weight: bold; color: #2c3e50; font-size: 1.1rem; }

        /* 商品行樣式 */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .item-row:hover { background: #f9f9f9; }
        .item-info { flex: 1; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .item-name { font-weight: bold; color: #333; font-size: 1.05rem; }
        .item-desc { font-size: 0.9rem; color: #7f8c8d; }
        .item-limit { font-size: 0.8rem; color: #e74c3c; background: #ffeeee; padding: 2px 6px; border-radius: 4px; border: 1px solid #ffdada; }

        .item-price { color: #e74c3c; font-weight: bold; margin-right: 15px; min-width: 45px; text-align: right; }
        .qty { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; font-size: 1rem; }
        
        /* 底部結帳區 */
        .total-box { position: sticky; bottom: 0; background: #fff3cd; padding: 20px; margin-top: 30px; border-radius: 10px; text-align: right; border: 2px solid #f1c40f; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .grand-total { font-size: 1.8rem; color: #d35400; font-weight: bold; }
        .btn { background: #27ae60; color: white; border: none; width: 100%; padding: 18px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-size: 1.2rem; font-weight: bold; box-shadow: 0 4px 0 #219150; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #219150; }
        .bank-note { font-size: 0.85rem; color: #7f8c8d; text-align: center; margin-top: 12px; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>⚔️ 倚天6. 江湖名門聖品選單</h2>
    
    <div class="info-section">
        <label>玩家 ID / 暱稱 (必填)</label>
        <input type="text" id="user-id" class="info-input" placeholder="請輸入您的遊戲名稱">
        
        <label>匯款帳號末五碼 (必填)</label>
        <input type="text" id="bank-id" class="info-input" placeholder="轉帳對帳用">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab1')">爆擊/絕學丹</button>
        <button class="tab-btn" onclick="openTab(event, 'tab2')">至尊多功能</button>
        <button class="tab-btn" onclick="openTab(event, 'tab3')">碎玉/金魂類</button>
        <button class="tab-btn" onclick="openTab(event, 'tab4')">天命/自修類</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="group-title">【爆擊丹藥】(永久提升)</div>
        <div id="items-crit"></div>
        <div class="group-title">【絕學丹】(威力提升)</div>
        <div id="items-skill"></div>
    </div>

    <div id="tab2" class="tab-content">
        <div class="group-title">【至尊丹藥】(多屬性疊加)</div>
        <div id="items-supreme"></div>
    </div>

    <div id="tab3" class="tab-content">
        <div class="group-title">【碎玉/金玉】(進階強化)</div>
        <div id="items-jade"></div>
        <div class="group-title">【金魂系列】(神級數值)</div>
        <div id="items-gold"></div>
    </div>

    <div id="tab4" class="tab-content">
        <div class="group-title">【天命/天悟】(自修效率)</div>
        <div id="items-destiny"></div>
    </div>

    <div class="total-box">
        <div>總計金額：<span class="grand-total">$<span id="grand-total-val">0</span></span></div>
        <button class="btn" onclick="submitOrder()">📋 複製訂單資訊（複製後去轉帳）</button>
        <div class="bank-note">點擊後會自動複製明細，請直接貼給賣家</div>
    </div>
</div>

<script>
    // 依據圖片資料整理的資料庫
    const products = {
        // 第一頁：爆擊與絕學
        crit: [
            {n: "爆擊仙丹", p: 30, f: "爆擊+3%", l: "限3"},
            {n: "爆擊金丹", p: 30, f: "爆擊+4%", l: "限3"},
            {n: "爆擊玄丹", p: 300, f: "爆擊+5%", l: "限3"},
            {n: "會心奇丹", p: 200, f: "爆傷+3%", l: "限10"},
            {n: "會心天丹", p: 1600, f: "爆傷+7%", l: "限3"}
        ],
        skill: [
            {n: "絕學威能丹", p: 500, f: "絕學威力+2%", l: "限10"},
            {n: "絕學威能天丹", p: 500, f: "絕學威力+2%", l: "限10"},
            {n: "絕學威能奇丹", p: 500, f: "絕學威力+2%", l: "限10"}
        ],
        // 第二頁：至尊系列
        supreme: [
            {n: "至尊般若天丹", p: 200, f: "爆2%+爆傷2%", l: "限10"},
            {n: "至尊般若聖丹", p: 70, f: "爆3%+爆傷2%", l: "限10"},
            {n: "至尊真龍天丹", p: 200, f: "攻120+爆1%+爆傷1%", l: "限10"},
            {n: "至尊真龍仙丹", p: 400, f: "攻180+爆3%+爆傷2%", l: "限10"},
            {n: "至尊無極天丹", p: 150, f: "防80+閃1%+抗爆1%", l: "限10"}
        ],
        // 第三頁：碎玉類
        jade: [
            {n: "乾坤金玉", p: 1200, f: "反6%+爆傷7%(20碎)", l: "限3"},
            {n: "絕霸金玉", p: 800, f: "爆6%+閃6%(20碎)", l: "限3"},
            {n: "武甲金玉", p: 800, f: "攻250+防250(20碎)", l: "限3"}
        ],
        gold: [
            {n: "武甲金魂", p: 6000, f: "攻50+防50(40碎)", l: "限5"},
            {n: "絕霸金魂", p: 6000, f: "爆3%+閃3%(40碎)", l: "限5"}
        ],
        // 第四頁：天命/自修
        destiny: [
            {n: "天命聖丹", p: 40, f: "自修+220", l: "限10"},
            {n: "天悟聖丹", p: 60, f: "天悟+69", l: "限10"},
            {n: "天命仙丹", p: 40, f: "自修+1%", l: "限10"},
            {n: "天悟仙丹", p: 60, f: "天悟+1%", l: "限10"}
        ]
    };

    // 渲染函數
    function renderItems(data, containerId) {
        const container = document.getElementById(containerId);
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <div class="item-info">
                    <span class="item-name">${item.n}</span>
                    <span class="item-desc">${item.f}</span>
                    <span class="item-limit">${item.l}</span>
                </div>
                <span class="item-price">$${item.p}</span>
                <input type="number" class="qty" data-price="${item.p}" data-name="${item.n}" value="0" min="0">
            `;
            container.appendChild(div);
        });
    }

    // 初始化所有分頁資料
    renderItems(products.crit, 'items-crit');
    renderItems(products.skill, 'items-skill');
    renderItems(products.supreme, 'items-supreme');
    renderItems(products.jade, 'items-jade');
    renderItems(products.gold, 'items-gold');
    renderItems(products.destiny, 'items-destiny');

    // 分頁切換功能
    function openTab(evt, tabName) {
        const contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        
        const btns = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");

        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // 跨頁面累計總分
    const totalDisp = document.getElementById('grand-total-val');
    document.addEventListener('input', (e) => {
        if(e.target.classList.contains('qty')) {
            let sum = 0;
            document.querySelectorAll('.qty').forEach(input => {
                sum += (parseFloat(input.value) || 0) * parseFloat(input.dataset.price);
            });
            totalDisp.innerText = sum.toLocaleString();
        }
    });

    // 提交訂單並複製
    function submitOrder() {
        const userId = document.getElementById('user-id').value;
        const bankId = document.getElementById('bank-id').value;
        if(!userId || !bankId) {
            alert('❌ 請輸入 玩家ID 與 末五碼，方便賣家對帳！');
            return;
        }

        let details = `【江湖補給訂單】\n👤 玩家：${userId}\n🏦 末五碼：${bankId}\n----------------\n`;
        let hasItem = false;
        document.querySelectorAll('.qty').forEach(input => {
            const val = parseInt(input.value);
            if(val > 0) {
                details += `● ${input.dataset.name} x ${val}\n`;
                hasItem = true;
            }
        });

        if(!hasItem) {
            alert('請至少選擇一樣商品！');
            return;
        }

        details += `----------------\n💰 總計金額：$${totalDisp.innerText}\n\n📢 已複製完成！請貼上給賣家。`;
        
        navigator.clipboard.writeText(details).then(() => {
            alert('✅ 訂單明細已成功複製到剪貼簿！');
        });
    }
</script>

</body>
</html>
